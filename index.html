<!DOCTYPE html>
<html>

<head>
  <title>Main</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js"
      }
    }
  </script>
</head>

<body>

  <script>
      AFRAME.registerComponent('collider-check', {
      dependencies: ['raycaster'],

      init: function () {
          this.el.addEventListener('raycaster-intersection', function () {
            console.log('Player hit !');
          });
        }
      });
    </script>
  </script>

  <a-scene stats id="scene" physics="gravity: 0 -9.8 0; debug: true" shadow="type: pcfsoft">

    <!-- Caméra et contrôleurs -->
    <a-entity id="cameraRig" position="0 1 0">
      <a-camera collider-check raycaster="objects: .person1; showLine:true;" position="0 1.5 10" wasd-controls look-controls>
        <a-cursor cursor="rayOrigin: mouse" raycaster="objects: .clickable, .person1"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Sol -->
    <a-plane id="ground" position="0 0 0" rotation="-90 0 0" src="./models/ground.jpg" material="repeat: 1 1" width="25" height="25" static-body></a-plane>

    <!-- Assets -->
    <a-assets>
      <!-- Male -->
      <a-asset-item id="person1" src="./models/Male1.glb"></a-asset-item>
      <a-asset-item id="person2" src="./models/Male2.glb"></a-asset-item>
      <a-asset-item id="person3" src="./models/Male3.glb"></a-asset-item>

      <!-- Female -->
      <a-asset-item id="person4" src="./models/Female1.glb"></a-asset-item>
      <a-asset-item id="person5" src="./models/Female2.glb"></a-asset-item>
      <a-asset-item id="person6" src="./models/Female3.glb"></a-asset-item>

      <!-- Props -->
      <a-asset-item id="Shelves" src="./models/Shelves.glb"></a-asset-item>
      <a-asset-item id="Soda" src="./models/Soda_Can.glb"></a-asset-item>
      <a-asset-item id="Door" src="./models/door.glb"></a-asset-item>
      <a-asset-item id="Conveyor" src="./models/Conveyor.glb"></a-asset-item>
      <a-asset-item id="Fire" src="./models/Fire.glb"></a-asset-item>
      <a-asset-item id="Box" src="./models/Box.glb"></a-asset-item>
      <a-asset-item id="Boxes" src="./models/Boxes.glb"></a-asset-item>
      <a-asset-item id="Desk_lamp" src="./models/Desk_lamp.glb"></a-asset-item>
      <a-asset-item id="Banana" src="./models/Banana.glb"></a-asset-item>
      <a-asset-item id="Briefcase" src="./models/Briefcase.glb"></a-asset-item>
      <a-asset-item id="CPMouse" src="./models/CP_Mouse.glb"></a-asset-item>
      <a-asset-item id="LED" src="./models/LED.glb"></a-asset-item>
      <a-asset-item id="Bubble" src="./models/Bubble.glb"></a-asset-item>
    </a-assets>

    <!-- Entities -->
    <a-entity id="person1" class="person1" gltf-model="#person1" position="0 0 10" rotation="0 180 0" scale="1.5 1.5 1.5" animation-mixer="clip: Armature|Idle; loop: repeat; timeScale: 1"></a-entity>

    <!-- Shelves -->
    <a-entity id="shelves_1" gltf-model="#Shelves" position="-5 0 3" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_2" gltf-model="#Shelves" position="5 0 3" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_3" gltf-model="#Shelves" position="-5 0 -5" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_4" gltf-model="#Shelves" position="5 0 -5" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_5" gltf-model="#Shelves" position="-5 0 -9.4" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_6" gltf-model="#Shelves" position="5 0 -9.4" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_7" gltf-model="#Shelves" position="-5 0 9" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_8" gltf-model="#Shelves" position="5 0 9" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_9" gltf-model="#Shelves" position="-9 0 3" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_10" gltf-model="#Shelves" position="-9 0 9" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_11" gltf-model="#Shelves" position="9 0 3" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_12" gltf-model="#Shelves" position="9 0 9" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_13" gltf-model="#Shelves" position="-9 0 -5" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_14" gltf-model="#Shelves" position="-9 0 -9.4" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_15" gltf-model="#Shelves" position="9 0 -5" rotation="0 0 0" scale="2 2 2"></a-entity>
    <a-entity id="shelves_16" gltf-model="#Shelves" position="9 0 -9.4" rotation="0 0 0" scale="2 2 2"></a-entity>

    <!-- Conveyor and Fire -->
    <a-entity id="" position="0 0 0" rotation="0 0 0" scale="1 1 1">
    </script>

    <!-- <a-entity id="person2" gltf-model="#person2" position="0 0 4" rotation="0 180 0" scale="1.5 1.5 1.5" animation-mixer="clip: Armature|Idle; loop: repeat; timeScale: 1">
      <a-text value="Person 2" position="-0.5 2.5 0" color="black"></a-text>
    </a-entity>

    <a-entity id="person3" gltf-model="#person3" position="0 0 -4" scale="1.5 1.5 1.5" animation-mixer="clip: Armature|Idle; loop: repeat; timeScale: 1">
      <a-text value="Person 3" position="-0.5 2.5 0" color="black"></a-text>
    </a-entity>

    <a-entity id="person4" gltf-model="#person4" position="4 0 0" scale="1.5 1.5 1.5" animation-mixer="clip: Armature|Idle; loop: repeat; timeScale: 1">
      <a-text value="Person 4" position="-0.5 2.5 0" color="black"></a-text>
    </a-entity>

    <a-entity id="person5" gltf-model="#person5" position="4 0 4" rotation="0 180 0" scale="1.5 1.5 1.5" animation-mixer="clip: Armature|Idle; loop: repeat; timeScale: 1">
      <a-text value="Person 5" position="-0.5 2.5 0" color="black"></a-text>
    </a-entity>

    <a-entity id="person6" gltf-model="#person6" position="4 0 -4" scale="1.5 1.5 1.5" animation-mixer="clip: Armature|Idle; loop: repeat; timeScale: 1">

    </a-entity> -->

    <!-- Shelves -->
    <a-entity id="shelves_1" gltf-model="#Shelves" position="-5 0 3" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_2" gltf-model="#Shelves" position="5 0 3" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_3" gltf-model="#Shelves" position="-5 0 -5" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_4" gltf-model="#Shelves" position="5 0 -5" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_5" gltf-model="#Shelves" position="-5 0 -9.4" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_6" gltf-model="#Shelves" position="5 0 -9.4" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_7" gltf-model="#Shelves" position="-5 0 9" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_8" gltf-model="#Shelves" position="5 0 9" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_9" gltf-model="#Shelves" position="-9 0 3" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_10" gltf-model="#Shelves" position="-9 0 9" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_11" gltf-model="#Shelves" position="9 0 3" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_12" gltf-model="#Shelves" position="9 0 9" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_13" gltf-model="#Shelves" position="-9 0 -5" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_14" gltf-model="#Shelves" position="-9 0 -9.4" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_15" gltf-model="#Shelves" position="9 0 -5" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <a-entity id="shelves_16" gltf-model="#Shelves" position="9 0 -9.4" rotation="0 0 0" scale="2 2 2">
    </a-entity>

    <!-- Le Convoyeur -->
    <a-entity id="" position="0 0 0" rotation="0 0 0" scale="1 1 1">
      <!-- Conveyor -->
      <a-entity id="conveyor" gltf-model="#Conveyor" position="3 0.6 0" rotation="0 0 0" scale="10 10 10"></a-entity>

      <!-- Feu -->
      <a-entity id="Fire" gltf-model="#Fire" position="-9.5 0 -1.5" rotation="0 0 0" scale="0.03 0.03 0.03" material="metalness: 1; roughness: 0; reflectivity: 1">
        <a-light type="point" position="0 0 0" intensity="0.5" color="red" animation="property: light.color; from:rgb(183, 28, 28); to:rgb(210, 61, 57); dur: 300; loop:true; dir: alternate; autoplay: true; easing: easeInOutSine; keyframes: [{color: rgb(183, 28, 28)}, {color: rgb(200, 50, 50)}, {color: rgb(210, 61, 57)}]"></a-light>
      </a-entity>
    </a-entity>

    <!-- Props -->
    <!-- Soda -->
    <a-entity id="soda" gltf-model="#Soda" position="-2 1 -3" scale="1 1 1">
    </a-entity>

    <!-- Box -->
    <a-entity id="Box" gltf-model="#Box" position="0 0 5" rotation="0 0 0" scale="5 5 5"></a-entity>

    <!-- Boxes -->
     <a-entity id="Boxes" gltf-model="#Boxes" position="-2 0 -10" rotation="0 45 0" scale="2 2 2"></a-entity>

    <!-- Lamp -->
    <a-entity id="Desk_lamp" gltf-model="#Desk_lamp" position="-1 1 -5" rotation="0 0 0" scale="0.1 0.1 0.1"></a-entity>

    <!-- Banana -->
    <a-entity id="Banana" gltf-model="#Banana" position="0 1 -5" rotation="0 0 0" scale="0.3 0.3 0.3"></a-entity>

    <!-- Biefcase -->
    <a-entity id="Briefcase" gltf-model="#Briefcase" position="3 1 -6" rotation="0 0 -90" scale="1 1 1"></a-entity>

    <!-- CPMouse -->
    <a-entity id="CPMouse" gltf-model="#CPMouse" position="2 1 -5" rotation="0 0 0" scale="0.1 0.1 0.1"></a-entity>

    <!-- Murs du bâtiment -->
    <a-plane id="FrontWall" position="0 2.5 -12" rotation="0 0 0" src="./models/brick-wall.jpg" width="25" height="10" static-body>
    </a-plane>

    <a-plane id="BackWall" position="0 2.5 12" rotation="0 180 0" src="./models/brick-wall.jpg" width="25" height="10" static-body>
      <!-- Door -->
      <a-entity id="door" gltf-model="#Door" position="0 -2.5 0" rotation="0 0 0" scale="0.04 0.025 0.04">
        <a-box id="void" color="black" position="0 90 3" width="90" height="220" depth="10"></a-box>
      </a-entity>
    </a-plane>

    <a-plane id="LeftWall" position="-12 2.5 0" rotation="0 90 0" src="./models/brick-wall.jpg" width="25" height="10" static-body>
    </a-plane>

    <a-plane id="RightWall" position="12 2.5 0" rotation="0 -90 0" src="./models/brick-wall.jpg" width="25" height="10" static-body>
    </a-plane>

    <!-- Plafond -->
    <a-plane id="Ceiling" position="0 7 0" rotation="90 0 0" src="./models/ceiling.jpg" width="25" height="25" roughness="0.5" static-body>

      <a-entity id="LED1" gltf-model="#LED" position="0 0 0" rotation="-90 0 0" scale="2 2 2" material="metalness: 1; roughness: 0; reflectivity: 1">
        <!-- <a-light type="spot" position="0 0 0" rotation="-90 0 0" intensity="0.3" color="#F9F3C1"></a-light> -->
        <a-light type="point" position="0 0 0" rotation="0 0 0" intensity="0.8" color="#F9F3C1"></a-light>
      </a-entity>
      
    </a-plane>
  </a-scene>
</body>

</html>
